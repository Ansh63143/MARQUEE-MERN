<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Card</title>
    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <div class="card">

        <div class="top-icons">
            <i class="fa-solid fa-arrow-left"></i>
            <i class="fa-solid fa-ellipsis-vertical"></i>
        </div>

        <img src="https://img.magnific.com/free-photo/portrait-white-man-isolated_53876-40306.jpg?semt=ais_hybrid&w=740&q=80"
            alt="Profile" class="profile-img">

        <h2>Developer</h2>
        <p>Vadodara Gujarat</p>

        <div class="social-icons">
            <i class="fab fa-facebook-f facebook"></i>
            <i class="fab fa-twitter twitter"></i>
            <i class="fab fa-instagram instagram"></i>
            <i class="fab fa-youtube youtube"></i>
        </div>

        <div class="buttons">
            <button>Message</button>
            <button>Subscribe</button>
        </div>

        <div class="stats">
            <div><i class="fa-regular fa-heart"></i> 20.4k</div>
            <div><i class="fa-regular fa-comment"></i> 14.3k</div>
            <div><i class="fa-solid fa-share"></i> 12.8k</div>
        </div>

    </div>

</body>

</html>
