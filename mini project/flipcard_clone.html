<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart Navbar</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="">
</head>
<body> 

    <nav class="navbar">

        <!-- Left Side -->
        <div class="left-section">

            <div class="menu-box active">
                <i class="fa-solid fa-bag-shopping"></i>
                <img src="https://rukminim2.flixcart.com/fk-p-flap/52/44/image/d2ecfddf891a3922.png?q=90" alt="">
                <span>Flipkart</span>
            </div>

            <div class="menu-box">
                <i class="fa-solid fa-motorcycle"></i>
                <img src="https://rukminim2.flixcart.com/fk-p-flap/56/44/image/716adbc920ad1eba.png?q=90" alt="">
                <span>Minutes</span>
            </div>

            <div class="menu-box">
                <i class="fa-solid fa-plane"></i>
                <img src="https://rukminim2.flixcart.com/fk-p-flap/58/44/image/7ab4040af860941d.png?q=90" alt="">
                <span>Travel</span>
            </div>

            <div class="menu-box">
                <i class="fa-solid fa-basket-shopping"></i>
                <img src="https://rukminim2.flixcart.com/fk-p-flap/56/44/image/2545bc4517298b90.png?q=90" alt="">
                <span>Grocery</span>
            </div>

        </div>

        <!-- Right Side -->
        <div class="right-section">

            <div class="location">
                <i class="fa-solid fa-location-dot"></i>
                <span class="pin">560068</span>
                <a href="#">Select delivery location</a>
                <i class="fa-solid fa-angle-right"></i>
            </div>

            <div class="coin-box">
                <i class="fa-solid fa-coins"></i>
                <span>0</span>
            </div>

        </div>

    </nav>

</body>
</html>
